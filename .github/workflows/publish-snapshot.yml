name: Publish snapshots

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-snapshot:
    if: github.ref == 'refs/heads/main' && github.ref_protected == true
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: central-snapshots
    env:
      CENTRAL_TOKEN_USER: ${{ secrets.CENTRAL_TOKEN_USER }}
      CENTRAL_TOKEN_PASS: ${{ secrets.CENTRAL_TOKEN_PASS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USER
          server-password: CENTRAL_TOKEN_PASS

      - name: Read project version
        id: project-version
        run: |
          version=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved project version: $version"

      - name: Publish SNAPSHOT build to Central
        if: endsWith(steps.project-version.outputs.version, '-SNAPSHOT')
        run: ./mvnw -B -Prelease -DskipTests deploy

      - name: Skip non-SNAPSHOT publish
        if: ${{ !endsWith(steps.project-version.outputs.version, '-SNAPSHOT') }}
        run: echo "Skipping snapshot publish because version ${{ steps.project-version.outputs.version }} is not a SNAPSHOT."


