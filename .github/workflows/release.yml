name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.ref == 'refs/heads/main' && github.ref_protected == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_version: ${{ steps.release.outputs.version }}
      release_tag: ${{ steps.release.outputs.tag_name }}
      release_sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: maven
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  publish-release:
    if: needs.release-please.outputs.release_created == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: central-releases
    permissions:
      contents: read
    env:
      CENTRAL_TOKEN_USER: ${{ secrets.CENTRAL_TOKEN_USER }}
      CENTRAL_TOKEN_PASS: ${{ secrets.CENTRAL_TOKEN_PASS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.release_tag }}
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USER
          server-password: CENTRAL_TOKEN_PASS

      - name: Confirm release version
        run: echo "Publishing release ${{ needs.release-please.outputs.release_version }} (${{ needs.release-please.outputs.release_tag }})"

      - name: Verify checked-out release version
        run: |
          version=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)
          test "$version" = "${{ needs.release-please.outputs.release_version }}"

      - name: Publish release to Central
        run: ./mvnw -B -Prelease -DskipTests deploy




